<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automotive ML Fraud Gateway</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            width: 450px;
            text-align: center;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 5px;
        }

        p {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: left;
        }

        label {
            font-weight: bold;
            font-size: 14px;
            color: #34495e;
        }

        input {
            padding: 12px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.4);
        }

        button {
            margin-top: 10px;
            padding: 14px;
            background-color: #2980b9;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #1f618d;
        }

        .result-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .danger {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Fraud Detection Engine</h2>
        <p>Intermediate Pipeline (SMOTE / RF / GridSearch)</p>

        <form action="/predict" method="post">

            <label for="total_claim_amount">Total Claim Amount Requested (₹)</label>
            <input type="number" id="total_claim_amount" name="total_claim_amount" placeholder="e.g. 150000" required>

            <label for="policy_annual_premium">Customer's Policy Annual Premium (₹)</label>
            <input type="number" id="policy_annual_premium" name="policy_annual_premium" placeholder="e.g. 12000"
                required>

            <label for="age">Customer Age</label>
            <input type="number" id="age" name="age" placeholder="e.g. 35" required>

            <button type="submit">Execute Predictor Tensor</button>
        </form>

        {% if prediction_text %}
        <div class="result-box {{ color }}">
            {{ prediction_text }}
        </div>
        {% endif %}
    </div>

</body>

</html>
